name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify package
        run: npm run build

      - name: Prepare installer artifacts
        run: npm run release:prepare

      - name: Generate validation report
        run: npm run release:validate -- --json --report-file dist/release/release-validation-report.json

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/release/install-ipfs-node.sh
            dist/release/install-ipfs-node.sh.sha256
            dist/release/release-manifest.json
            dist/release/release-validation-report.json

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/install-ipfs-node.sh
            dist/release/install-ipfs-node.sh.sha256
            dist/release/release-manifest.json
            dist/release/release-validation-report.json
          generate_release_notes: true
